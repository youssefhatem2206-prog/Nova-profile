<!DOCTYPE html>
<html lang="en">
<head>
    <title>Project Details – Youssef Hatem</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/x-icon" href="images/Char1.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="project.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Marked.js (markdown renderer) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top navbar-custom scrolled">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="images/Char1.png" alt="Logo" class="navbar-logo">
                <span class="brand-text">Youssef Hatem</span>
            </a>
            <a href="index.html#portfolio" class="btn btn-sm btn-outline-light ms-auto">
                <i class="fas fa-arrow-left me-1"></i> Back to Portfolio
            </a>
        </div>
    </nav>

    <!-- Loading State -->
    <div id="loading-state" class="project-loading">
        <div class="spinner-border" style="color:var(--accent-color)" role="status"></div>
        <p class="mt-3 text-muted">Loading project…</p>
    </div>

    <!-- Error State -->
    <div id="error-state" class="project-error d-none">
        <i class="fas fa-exclamation-circle fa-3x text-danger mb-3"></i>
        <h4>Project not found</h4>
        <a href="index.html#portfolio" class="btn btn-primary mt-3">Back to Portfolio</a>
    </div>

    <!-- Project Content -->
    <main id="project-content" class="d-none">

        <!-- Video / Thumbnail Hero -->
        <section class="project-hero">
            <div id="video-container"></div>
        </section>

        <!-- Project Info -->
        <section class="project-info section-padding">
            <div class="container">
                <div class="row">
                    <!-- Left: Title + Description -->
                    <div class="col-lg-8">
                        <div id="project-tags" class="project-tags mb-3"></div>
                        <h1 id="project-title" class="project-page-title"></h1>
                        <div class="project-actions mt-3 mb-5">
                            <a id="btn-live" href="#" target="_blank" class="btn btn-primary me-2 d-none">
                                <i class="fas fa-external-link-alt me-1"></i> Live Demo
                            </a>
                            <a id="btn-github" href="#" target="_blank" class="btn btn-dark d-none">
                                <i class="fab fa-github me-1"></i> GitHub Repo
                            </a>
                        </div>
                        <div id="project-description" class="project-description"></div>
                    </div>

                    <!-- Right: Meta -->
                    <div class="col-lg-4">
                        <div class="project-meta-card">
                            <h5 class="meta-title"><i class="fas fa-info-circle me-2"></i>Project Info</h5>
                            <ul class="meta-list">
                                <li id="meta-category" class="d-none">
                                    <span class="meta-label">Category</span>
                                    <span id="meta-category-val" class="meta-value"></span>
                                </li>
                                <li>
                                    <span class="meta-label">Technologies</span>
                                    <span id="meta-tags" class="meta-value"></span>
                                </li>
                            </ul>

                            <div class="meta-links mt-4">
                                <a id="meta-btn-live" href="#" target="_blank" class="meta-link d-none">
                                    <i class="fas fa-globe"></i> Live Demo
                                </a>
                                <a id="meta-btn-github" href="#" target="_blank" class="meta-link d-none">
                                    <i class="fab fa-github"></i> View on GitHub
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Social Icons -->
    <div class="social-icons">
        <a href="https://github.com/youssef13494" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
        <a href="https://www.linkedin.com/in/youssef-hatem-timsah-244b6b207/" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
        <a href="https://www.kaggle.com/youssefhatem1" target="_blank" title="Kaggle"><i class="fab fa-kaggle"></i></a>
        <a href="https://wa.me/201128252206" target="_blank" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
        <a href="mailto:youssefhatem206@gmail.com" target="_blank" title="Email"><i class="fas fa-envelope"></i></a>
    </div>

    <script type="module" src="script/project.js"></script>
</body>
</html>
