<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Admin Login – Noventiq Data & AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="../images/noventiq-icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="login-body">

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo-text">
                    <span class="brand-novent">NOVENT</span><span class="brand-iq">IQ</span>
                </div>
                <h2>Admin Panel</h2>
                <p class="text-muted">Data & AI Team · Egypt</p>
            </div>

            <form id="login-form" novalidate>
                <div class="mb-4">
                    <label class="form-label" for="admin-password">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" id="admin-password" class="form-control" placeholder="Enter admin password" required autocomplete="current-password">
                        <button type="button" class="input-group-text btn-toggle-pw" id="toggle-pw" title="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div id="login-error" class="alert alert-danger d-none py-2" role="alert"></div>

                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>

            <div class="login-footer mt-4">
                <a href="../index.html" class="text-muted small">
                    <i class="fas fa-arrow-left me-1"></i> Back to Site
                </a>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASS = 'noventiq2025'; // change this!

        // If already logged in
        if (sessionStorage.getItem('admin_auth') === '1') {
            window.location.href = 'dashboard.html';
        }

        // Toggle password visibility
        document.getElementById('toggle-pw').addEventListener('click', () => {
            const pw   = document.getElementById('admin-password');
            const icon = document.querySelector('#toggle-pw i');
            if (pw.type === 'password') {
                pw.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pw.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        // Login
        document.getElementById('login-form').addEventListener('submit', e => {
            e.preventDefault();
            const pw      = document.getElementById('admin-password').value;
            const errorEl = document.getElementById('login-error');
            if (pw === ADMIN_PASS) {
                sessionStorage.setItem('admin_auth', '1');
                window.location.href = 'dashboard.html';
            } else {
                errorEl.textContent = 'Incorrect password. Please try again.';
                errorEl.classList.remove('d-none');
                document.getElementById('admin-password').value = '';
            }
        });
    </script>
</body>
</html>
