<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Login – Youssef Hatem</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="../images/Char1.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="admin.css">
</head>
<body class="login-body">

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <img src="../images/Char1.png" alt="Logo" class="login-logo">
                <h2>Admin Panel</h2>
                <p class="text-muted">Sign in to manage your portfolio</p>
            </div>

            <form id="login-form" novalidate>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" id="admin-email" class="form-control" placeholder="admin@email.com" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" id="admin-password" class="form-control" placeholder="••••••••" required>
                        <button type="button" class="input-group-text btn-toggle-pw" id="toggle-pw">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div id="login-error" class="alert alert-danger d-none py-2" role="alert"></div>

                <button type="submit" class="btn btn-primary w-100" id="login-btn">
                    <span id="login-text">Sign In</span>
                    <span id="login-spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
                </button>
            </form>

            <div class="login-footer mt-4">
                <a href="../index.html" class="text-muted small">
                    <i class="fas fa-arrow-left me-1"></i> Back to Portfolio
                </a>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth } from '../firebase-config.js';
        import {
            signInWithEmailAndPassword,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        // If already logged in, go straight to dashboard
        onAuthStateChanged(auth, user => {
            if (user) window.location.href = 'dashboard.html';
        });

        // Toggle password visibility
        document.getElementById('toggle-pw').addEventListener('click', () => {
            const pw = document.getElementById('admin-password');
            const icon = document.querySelector('#toggle-pw i');
            if (pw.type === 'password') {
                pw.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pw.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        // Login form submit
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email    = document.getElementById('admin-email').value.trim();
            const password = document.getElementById('admin-password').value;
            const errorEl  = document.getElementById('login-error');
            const spinner  = document.getElementById('login-spinner');
            const btnText  = document.getElementById('login-text');

            errorEl.classList.add('d-none');
            spinner.classList.remove('d-none');
            btnText.textContent = 'Signing in…';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'dashboard.html';
            } catch (err) {
                spinner.classList.add('d-none');
                btnText.textContent = 'Sign In';
                const messages = {
                    'auth/user-not-found':  'No account found with this email.',
                    'auth/wrong-password':  'Incorrect password.',
                    'auth/invalid-email':   'Invalid email address.',
                    'auth/too-many-requests': 'Too many attempts. Please try again later.'
                };
                errorEl.textContent = messages[err.code] || 'Login failed. Please try again.';
                errorEl.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
